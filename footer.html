<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PPLS Footer</title>

    <!-- ✅ ICON LIBRARY (IMPORTANT) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        background: #020617;
        font-family: Arial, sans-serif;
      }

      .footer-white {
        background: #020617;
        color: #fff;
        padding: 50px 80px 20px;
      }

      .footer-top {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 40px;
      }

      .footer-brand img {
        width: 220px;
      }

      .footer-links {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .footer-links h4 {
        margin-bottom: 10px;
      }

      .footer-links a {
        color: #cbd5f5;
        text-decoration: none;
        font-size: 15px;
      }

      .footer-links a:hover {
        color: #fff;
      }

      .footer-cta h3 {
        max-width: 220px;
        margin-bottom: 20px;
      }

      /* 🔥 PERFECT SOCIAL ICONS */
      .footer-social {
        display: flex;
        gap: 20px;
        margin-top: 20px;
      }

      .footer-social a {
        width: 65px;
        height: 65px;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        transition: all 0.3s ease;
        text-decoration: none;
      }

      .footer-social a i {
        font-size: 26px;
        color: #fff;
      }

      .footer-social a:hover {
        transform: scale(1.1);
      }

      .footer-bottom {
        margin-top: 40px;
        border-top: 1px solid #1e293b;
        text-align: center;
        padding-top: 15px;
        color: #94a3b8;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <footer class="footer-white">
      <div class="footer-top">
        <!-- BRAND -->
        <div class="footer-brand">
          <img src="assets/PPLS_logo_white_text.png" alt="PPLS Consultancy" />
        </div>

        <!-- COMPANY -->
        <div class="footer-links">
          <h4>Company</h4>
          <a href="index.html">Home</a>
          <a href="Product.html">Products</a>
          <a href="services.html">Services</a>
          <a href="contact.html">Contact</a>
        </div>

        <!-- WHAT WE DO -->
        <div class="footer-links">
          <h4>What We Do</h4>
          <a href="It-Consulting.html">IT Consulting</a>
          <a href="AiSolutions.html">AI Solutions</a>
          <a href="WebDev.html">Web Development</a>
          <a href="contact.html">Support</a>
        </div>

        <!-- CTA + SOCIAL -->
        <div class="footer-cta">
          <h3>Let’s build something intelligent</h3>

          <div class="footer-social">
            <!-- LinkedIn -->
            <a
              href="https://www.linkedin.com/company/ppls-consultancy/posts/?feedView=all"
              target="_blank"
            >
              <i class="fab fa-linkedin-in"></i>
            </a>

            <!-- Instagram -->
            <a
              href="https://www.instagram.com/ppls_consultancy/"
              target="_blank"
            >
              <i class="fab fa-instagram"></i>
            </a>

            <!-- Facebook -->
            <a
              href="https://www.facebook.com/profile.php?id=61574438229476"
              target="_blank"
            >
              <i class="fab fa-facebook-f"></i>
            </a>
          </div>
        </div>
      </div>

      <div class="footer-bottom">
        © 2026 PPLS Consultancy. All rights reserved.
      </div>
    </footer>
  </body>
</html>
